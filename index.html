<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İspanyolca Sayı Sorgulama</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --surface: #18181c;
    --surface2: #222228;
    --border: #2e2e38;
    --accent: #e8ff47;
    --accent-dim: rgba(232,255,71,0.12);
    --accent-dim2: rgba(232,255,71,0.06);
    --text: #f0f0f0;
    --muted: #888898;
    --danger: #ff6b6b;
    --success: #69ffc3;
    --mono: 'DM Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(232,255,71,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    width: 100%;
    max-width: 540px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 2rem;
  }
  .logo {
    font-family: var(--display);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .logo span { color: var(--muted); font-weight: 400; }
  .range-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  /* Mode tabs */
  .mode-tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 1.25rem;
    gap: 4px;
  }
  .tab {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 7px;
    background: transparent;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .tab.active {
    background: var(--accent);
    color: #0e0e10;
    font-weight: 500;
  }

  /* Jump row */
  .jump-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1.25rem;
  }
  .jump-input {
    flex: 1;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .jump-input:focus { border-color: var(--accent); }
  .jump-input::placeholder { color: var(--muted); }
  .jump-btn {
    padding: 10px 18px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .jump-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 1.25rem;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    text-align: center;
  }
  .stat-val {
    font-family: var(--display);
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
  }
  .stat-lbl {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Progress */
  .progress-wrap {
    height: 3px;
    background: var(--border);
    border-radius: 4px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }
  .progress-fill {
    height: 3px;
    background: var(--accent);
    border-radius: 4px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* Main card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    margin-bottom: 1rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
  }
  .card.revealed { border-color: rgba(232,255,71,0.3); }

  .num-display {
    font-family: var(--display);
    font-size: 96px;
    font-weight: 800;
    color: var(--text);
    text-align: center;
    line-height: 1;
    margin-bottom: 0.5rem;
    letter-spacing: -2px;
    transition: transform 0.2s;
  }
  .card.flip .num-display { transform: scale(0.95); opacity: 0.7; }

  .card-hint {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  /* Answer area */
  .answer-area {
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px dashed var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .answer-area:hover { border-color: var(--muted); }
  .answer-area.revealed {
    border-style: solid;
    border-color: var(--accent);
    background: var(--accent-dim2);
    cursor: default;
  }
  .answer-text {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.05em;
    transition: all 0.3s;
    text-align: center;
    padding: 0 1rem;
  }
  .answer-area.revealed .answer-text {
    color: var(--accent);
    font-size: 18px;
  }

  /* Controls row */
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 1rem;
  }
  .btn {
    padding: 12px 0;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
    flex: 1;
  }
  .btn:hover { background: var(--surface2); border-color: var(--muted); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .btn-next {
    background: var(--accent);
    border-color: var(--accent);
    color: #0e0e10;
    font-weight: 500;
  }
  .btn-next:hover { background: #d6eb30; border-color: #d6eb30; }

  /* 🔊 Ses butonu */
  .btn-speak {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 13px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 1rem;
  }
  .btn-speak:hover { border-color: var(--success); color: var(--success); }
  .btn-speak.speaking {
    border-color: var(--success);
    color: var(--success);
    background: rgba(105,255,195,0.06);
    animation: pulse-border 1s infinite;
  }
  .btn-speak:disabled { opacity: 0.3; cursor: not-allowed; }

  .speak-icon {
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .bar {
    width: 3px;
    border-radius: 2px;
    background: currentColor;
    transition: height 0.1s;
  }
  .bar1 { height: 8px; }
  .bar2 { height: 14px; }
  .bar3 { height: 10px; }
  .bar4 { height: 6px; }

  .btn-speak.speaking .bar1 { animation: wave 0.6s infinite 0s; }
  .btn-speak.speaking .bar2 { animation: wave 0.6s infinite 0.1s; }
  .btn-speak.speaking .bar3 { animation: wave 0.6s infinite 0.2s; }
  .btn-speak.speaking .bar4 { animation: wave 0.6s infinite 0.3s; }

  @keyframes wave {
    0%, 100% { height: 6px; }
    50% { height: 16px; }
  }
  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 0 0 rgba(105,255,195,0.3); }
    50% { box-shadow: 0 0 0 4px rgba(105,255,195,0); }
  }

  /* Speed control */
  .speed-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
  }
  .speed-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
  .speed-slider {
    flex: 1;
    -webkit-appearance: none;
    height: 3px;
    background: var(--border);
    border-radius: 4px;
    outline: none;
  }
  .speed-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  .speed-val { font-size: 12px; color: var(--accent); min-width: 28px; text-align: right; }

  /* Keyboard hint */
  .kbd-hint {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
    margin-top: 0.5rem;
  }
  .kbd {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 10px;
    color: var(--muted);
  }

  /* Voice unavailable notice */
  .notice {
    background: rgba(255,107,107,0.08);
    border: 1px solid rgba(255,107,107,0.25);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--danger);
    margin-bottom: 1rem;
    display: none;
  }
</style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <div class="logo">Número<span>quiz</span></div>
    <div class="range-label">1 — 5.000</div>
  </div>

  <div class="mode-tabs">
    <button class="tab active" onclick="setMode('sira')" id="btn-sira">Sıralı</button>
    <button class="tab" onclick="setMode('karisik')" id="btn-karisik">Karışık</button>
  </div>

  <div class="jump-row">
    <input class="jump-input" type="number" id="jump-input" min="1" max="5000" placeholder="Sayıya atla (1–5000)">
    <button class="jump-btn" onclick="jumpTo()">Git</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-val" id="stat-current">1</div><div class="stat-lbl">Şimdiki</div></div>
    <div class="stat"><div class="stat-val" id="stat-seen">0</div><div class="stat-lbl">Görülen</div></div>
    <div class="stat"><div class="stat-val" id="stat-remaining">5000</div><div class="stat-lbl">Kalan</div></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <div class="card" id="main-card">
    <div class="num-display" id="num-display">1</div>
    <div class="card-hint">İspanyolcasını düşün, sonra tıkla</div>
    <div class="answer-area" id="answer-area" onclick="reveal()">
      <div class="answer-text" id="answer-text">Cevabı Göster</div>
    </div>
  </div>

  <!-- Ses butonu -->
  <button class="btn-speak" id="btn-speak" onclick="speakNumber()" title="İspanyolca oku (S)">
    <span class="speak-icon">
      <span class="bar bar1"></span>
      <span class="bar bar2"></span>
      <span class="bar bar3"></span>
      <span class="bar bar4"></span>
    </span>
    Sesli Oku (İspanyolca)
  </button>

  <!-- Hız kontrolü -->
  <div class="speed-row">
    <span class="speed-label">Okuma Hızı</span>
    <input type="range" class="speed-slider" id="speed-slider" min="0.5" max="1.5" step="0.1" value="0.85" oninput="updateSpeed()">
    <span class="speed-val" id="speed-val">0.85×</span>
  </div>

  <div class="notice" id="notice">
    Tarayıcınız ses sentezini desteklemiyor. Güncel bir tarayıcı deneyin.
  </div>

  <div class="controls">
    <button class="btn" onclick="prev()" id="btn-prev" disabled>← Önceki</button>
    <button class="btn btn-next" onclick="next()" id="btn-next">Sonraki →</button>
  </div>

  <div class="kbd-hint">
    <kbd class="kbd">←</kbd> önceki &nbsp;
    <kbd class="kbd">→</kbd> sonraki &nbsp;
    <kbd class="kbd">Space</kbd> göster &nbsp;
    <kbd class="kbd">S</kbd> sesli oku
  </div>

</div>

<script>
/* ─── Sayı → İspanyolca ─────────────────────────────────── */
const ones = [
  '','uno','dos','tres','cuatro','cinco','seis','siete','ocho','nueve',
  'diez','once','doce','trece','catorce','quince',
  'dieciséis','diecisiete','dieciocho','diecinueve',
  'veinte','veintiuno','veintidós','veintitrés','veinticuatro',
  'veinticinco','veintiséis','veintisiete','veintiocho','veintinueve'
];
const tens = ['','diez','veinte','treinta','cuarenta','cincuenta','sesenta','setenta','ochenta','noventa'];
const hundreds = ['','ciento','doscientos','trescientos','cuatrocientos','quinientos',
                  'seiscientos','setecientos','ochocientos','novecientos'];

function underThousand(n) {
  if (n === 0) return '';
  if (n === 100) return 'cien';
  const h = Math.floor(n / 100);
  const rem = n % 100;
  let out = '';
  if (h) out += hundreds[h] + (rem ? ' ' : '');
  if (rem < 30) { out += ones[rem]; }
  else {
    const t = Math.floor(rem / 10), o = rem % 10;
    out += tens[t] + (o ? ' y ' + ones[o] : '');
  }
  return out;
}

function toSpanish(n) {
  if (n === 0) return 'cero';
  if (n === 1000) return 'mil';
  if (n < 1000) return underThousand(n);
  const th = Math.floor(n / 1000);
  const rem = n % 1000;
  const prefix = th === 1 ? 'mil' : underThousand(th) + ' mil';
  if (!rem) return prefix;
  return prefix + ' ' + underThousand(rem);
}

/* ─── State ──────────────────────────────────────────────── */
let mode = 'sira';
let order = Array.from({length:5000},(_,i)=>i+1);
let current = 0;
let seen = 0;
let revealed = false;
let speaking = false;
let speechRate = 0.85;

/* ─── DOM refs ───────────────────────────────────────────── */
const numDisplay   = document.getElementById('num-display');
const answerArea   = document.getElementById('answer-area');
const answerText   = document.getElementById('answer-text');
const mainCard     = document.getElementById('main-card');
const progressFill = document.getElementById('progress-fill');
const statCurrent  = document.getElementById('stat-current');
const statSeen     = document.getElementById('stat-seen');
const statRem      = document.getElementById('stat-remaining');
const btnPrev      = document.getElementById('btn-prev');
const btnNext      = document.getElementById('btn-next');
const btnSpeak     = document.getElementById('btn-speak');
const speedSlider  = document.getElementById('speed-slider');
const speedVal     = document.getElementById('speed-val');
const notice       = document.getElementById('notice');

/* ─── Speech ─────────────────────────────────────────────── */
const synth = window.speechSynthesis;
if (!synth) notice.style.display = 'block';

function getSpanishVoice() {
  const voices = synth.getVoices();
  return (
    voices.find(v => v.lang === 'es-ES') ||
    voices.find(v => v.lang === 'es-MX') ||
    voices.find(v => v.lang.startsWith('es')) ||
    null
  );
}

function speakNumber() {
  if (!synth) return;
  if (speaking) { synth.cancel(); return; }

  const n = order[current];
  const text = toSpanish(n);
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'es-ES';
  utterance.rate = speechRate;
  utterance.pitch = 1;

  const voice = getSpanishVoice();
  if (voice) utterance.voice = voice;

  utterance.onstart = () => {
    speaking = true;
    btnSpeak.classList.add('speaking');
    btnSpeak.textContent = '';
    const icon = document.createElement('span');
    icon.className = 'speak-icon';
    icon.innerHTML = '<span class="bar bar1"></span><span class="bar bar2"></span><span class="bar bar3"></span><span class="bar bar4"></span>';
    btnSpeak.appendChild(icon);
    btnSpeak.appendChild(document.createTextNode(' Okunuyor...'));
  };
  utterance.onend = utterance.onerror = () => {
    speaking = false;
    btnSpeak.classList.remove('speaking');
    btnSpeak.innerHTML = '<span class="speak-icon"><span class="bar bar1"></span><span class="bar bar2"></span><span class="bar bar3"></span><span class="bar bar4"></span></span> Sesli Oku (İspanyolca)';
  };

  synth.cancel();
  synth.speak(utterance);
}

function updateSpeed() {
  speechRate = parseFloat(speedSlider.value);
  speedVal.textContent = speechRate.toFixed(2) + '×';
}

/* ─── Card logic ─────────────────────────────────────────── */
function showCard() {
  revealed = false;
  synth && synth.cancel();
  speaking = false;
  btnSpeak.classList.remove('speaking');
  btnSpeak.innerHTML = '<span class="speak-icon"><span class="bar bar1"></span><span class="bar bar2"></span><span class="bar bar3"></span><span class="bar bar4"></span></span> Sesli Oku (İspanyolca)';

  const n = order[current];
  numDisplay.textContent = n;
  answerText.textContent = 'Cevabı Göster';
  answerArea.className = 'answer-area';
  mainCard.className = 'card';

  statCurrent.textContent = n;
  statSeen.textContent = seen;
  statRem.textContent = 5000 - seen;
  progressFill.style.width = (seen / 5000 * 100).toFixed(2) + '%';

  btnPrev.disabled = current === 0;
  btnNext.disabled = false;
}

function reveal() {
  if (revealed) return;
  revealed = true;
  seen = Math.max(seen, current + 1);

  const n = order[current];
  answerText.textContent = toSpanish(n);
  answerArea.className = 'answer-area revealed';
  mainCard.className = 'card revealed';

  statSeen.textContent = seen;
  statRem.textContent = 5000 - seen;
  progressFill.style.width = (seen / 5000 * 100).toFixed(2) + '%';
}

function next() {
  if (!revealed) reveal();
  if (current < 4999) { current++; showCard(); }
}

function prev() {
  if (current > 0) { current--; showCard(); }
}

function jumpTo() {
  const val = parseInt(document.getElementById('jump-input').value);
  if (val >= 1 && val <= 5000) {
    if (mode === 'sira') {
      current = val - 1;
    } else {
      const idx = order.indexOf(val);
      if (idx !== -1) current = idx;
    }
    showCard();
  }
}

function setMode(m) {
  mode = m;
  document.getElementById('btn-sira').className = 'tab' + (m==='sira'?' active':'');
  document.getElementById('btn-karisik').className = 'tab' + (m==='karisik'?' active':'');
  order = m === 'karisik'
    ? Array.from({length:5000},(_,i)=>i+1).sort(()=>Math.random()-0.5)
    : Array.from({length:5000},(_,i)=>i+1);
  current = 0; seen = 0;
  showCard();
}

/* ─── Keyboard ───────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  if (e.key === 'ArrowRight' || e.key === 'Enter') next();
  else if (e.key === 'ArrowLeft') prev();
  else if (e.key === ' ') { e.preventDefault(); reveal(); }
  else if (e.key === 's' || e.key === 'S') speakNumber();
});

/* ─── Voices load async ──────────────────────────────────── */
if (synth && synth.onvoiceschanged !== undefined) {
  synth.onvoiceschanged = () => {};
}

showCard();
</script>
</body>
</html>
